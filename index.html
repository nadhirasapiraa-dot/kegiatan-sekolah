<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #EEF7F1 10%, #9FC4A6 75%, #7FBF9B 100%);
  font-family: 'Poppins', sans-serif;

  display: flex;
  flex-direction: column; 
}

.container {
  flex: 1; 
  display: flex;
  justify-content: center;
  align-items: center;
}

.bubbles {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* bubble */
.bubbles span {
  position: absolute;
  bottom: -50px;
  width: 20px;
  height: 20px;
  background: rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  animation: naik 10s linear infinite;
}

/* variasi ukuran & posisi */
.bubbles span:nth-child(1) {
  left: 10%;
  width: 15px;
  height: 15px;
  animation-duration: 8s;
}
.bubbles span:nth-child(2) {
  left: 25%;
  width: 25px;
  height: 25px;
  animation-duration: 12s;
}
.bubbles span:nth-child(3) {
  left: 40%;
  width: 10px;
  height: 10px;
  animation-duration: 6s;
}
.bubbles span:nth-child(4) {
  left: 60%;
  width: 30px;
  height: 30px;
  animation-duration: 14s;
}
.bubbles span:nth-child(5) {
  left: 75%;
  width: 18px;
  height: 18px;
  animation-duration: 9s;
}
.bubbles span:nth-child(6) {
  left: 90%;
  width: 22px;
  height: 22px;
  animation-duration: 11s;
}

/* animasi naik + goyang */
@keyframes naik {
  0% {
    transform: translateY(0) translateX(0);
    opacity: 0.7;
  }
  50% {
    transform: translateY(-400px) translateX(30px);
  }
  100% {
    transform: translateY(-800px) translateX(-30px);
    opacity: 0;
  }
}

.bubbles span {
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.container {
    display: flex;
    justify-content: center; 
    align-items: center;    
    text-align: center;     
    min-height: calc(100vh - 40px); 
}

.card {
  width: 70%;
  max-width: 350px;
  height: auto;
  padding: 20px;
  border-radius: 10px;
  background: white;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  text-align: center;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

.card h2 {
  background: #8FC4A6;
  color: white;
  padding: 16px;
  margin: -20px -20px 20px -20px;
  border-radius: 12px 12px 0 0;

  font-size: 1.2rem;
  line-height: 1.5;
  font-weight: 600;
}

@keyframes glow {
  from {
    opacity: 0.8;
  }
  to {
    opacity: 1;
    letter-spacing: 1px;
  }
}



/* Button group */
.btn-group {
  flex-direction: column;
  gap: 10px;
  justify-content: center;
  display: flex; gap: 12px;
  flex-wrap: wrap;
}


.btn {
  padding: 10px 18px;
  border: 1px solid #aaa;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  background: transparent;
  color: #aaa;
  transition: 0.2s;
  border: none;             
    outline: none;       
}

a.btn {
  text-decoration: none;
}

.footer {
  font-size: 12px;
  color: #4f6458;
  opacity: 0.9;
  font-weight: 500;
    text-align: center;
  padding: 12px;
  margin-top: auto;
}

</style>

</head>
<body>
  <div class="bubbles">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="container">
  <div class="card">
    <h2>Agenda Hari Ini di SMKN 4 Tasikmalaya.</h2>

    <div class="btn-group">
      <a href="kegiatan.html" class="btn">Lihat Kegiatan</a>
    </div>

    <a href="mapel.html" class="btn">Mata Pelajaran</a>
 </div>
 
</div>
    <p class="footer">© 2026 Nadira — Projek Mandiri</p>
 
</body>
</html>
